# Vellum (outpaint.aaroncollins.info) — static SPA server block.
# Copied into the nginx:alpine image at /etc/nginx/conf.d/default.conf,
# replacing the stock "welcome to nginx" default site.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # onnxruntime-web ships its WASM binary as a static asset. nginx:alpine's
    # stock /etc/nginx/mime.types already maps .wasm -> application/wasm, but
    # we pin it explicitly so the app keeps working even if a future base
    # image ships an older/incomplete mime.types. A wrong MIME type here makes
    # browsers refuse to instantiate the WebAssembly module.
    #
    # NOTE: this is intentionally NOT a `types { ... }` block. That directive
    # *replaces* the whole inherited MIME table rather than extending it, so
    # redeclaring it here would silently reset every other extension (css,
    # js, svg, ...) to the default_type (application/octet-stream) and break
    # the entire site — verified live against nginx:alpine before landing
    # this file. `default_type` scoped to a `.wasm` location is a scalar
    # fallback and doesn't have that problem.
    # Regex locations take priority over the `/assets/` prefix location below
    # (nginx always prefers a matching regex location over a prefix one), so
    # a hashed .wasm under /assets/ needs its own rule to keep the same
    # immutable long-cache treatment the rest of /assets/ gets — otherwise it
    # would silently fall through to the unhashed-file rule below and lose
    # caching on what's typically a large (10s of MB) binary.
    location ~* ^/assets/.*\.wasm$ {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Any other .wasm (e.g. unhashed files copied straight into public/, per
    # onnxruntime-web's documented wasmPaths setup) still needs the correct
    # MIME type, but isn't safe to cache immutably: an unhashed filename can
    # point at different content after a redeploy.
    location ~* \.wasm$ {
        default_type application/wasm;
        try_files $uri =404;
    }

    # --- Cross-origin isolation for WebGPU/WASM multithreading ---------------
    # onnxruntime-web's threaded WASM backend needs `crossOriginIsolated` to be
    # true in the browser, which requires both COOP and COEP response headers
    # on the top-level document.
    #
    # We deliberately use COEP "credentialless" instead of the stricter
    # "require-corp". require-corp forces every cross-origin subresource
    # (fonts, and — critically — ONNX model weights fetched from
    # huggingface.co) to explicitly opt in via Cross-Origin-Resource-Policy,
    # which most third-party hosts (including the HF CDN) don't send. That
    # would break model downloads. "credentialless" still yields
    # crossOriginIsolated=true (satisfying onnxruntime-web) while letting
    # no-credential cross-origin fetches (like anonymous model downloads)
    # through unmodified. See: https://developer.chrome.com/blog/coep-credentialless-origin-trial
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # SPA fallback: any path that isn't a real file resolves to index.html so
    # client-side routing (if/when added) doesn't 404 on refresh/deep-link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Vite fingerprints everything under /assets/ (content hash in the
    # filename), so those files are immutable — safe to cache for a year.
    location /assets/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html itself must always be revalidated, otherwise browsers/CDNs
    # can pin an old shell that references stale hashed asset filenames.
    location = /index.html {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "credentialless" always;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;

    location = /favicon.svg { access_log off; }
    location = /robots.txt { access_log off; }

    # PWA manifest. Stock nginx:alpine mime.types has no `.webmanifest` entry, so
    # it would otherwise be served as application/octet-stream. Being installable
    # is what makes Chrome grant *persistent* storage — which exempts the ~2.5 GB
    # weight cache from best-effort eviction (the "re-downloads every refresh"
    # bug). A scalar default_type here is safe (unlike a `types { }` block, which
    # would wipe the inherited MIME table — see the .wasm note above).
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }
}
